<html lang="ar" dir="rtl">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#F8FAFC" />
<meta name="apple-mobile-web-app-capable" content="yes" />

<title>مسابقة الفرق</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />

<style>
/* ============================================
إعادة تهيئة أساسية وإعدادات عامة
============================================ */
*, *::before, *::after {
box-sizing: border-box;
margin: 0;
padding: 0;
}

:root {
/* الثيم الفاتح الجديد */
--bg-main: #F8FAFC;       /* خلفية رمادية فاتحة جداً */
--bg-card: #FFFFFF;       /* بطاقات بيضاء */
--bg-border: #E2E8F0;     /* حدود ناعمة */
--team1: #EA580C;         /* برتقالي داكن قليلاً ليتناسب مع الأبيض */
--team1-hover: #C2410C;
--team2: #16A34A;         /* أخضر داكن قليلاً ليتناسب مع الأبيض */
--team2-hover: #15803D;
--text-primary: #0F172A;  /* نصوص داكنة */
--text-secondary: #475569;/* نصوص ثانوية رمادية */
--btn-neutral: #CBD5E1;   
--radius: 16px;
--transition: 0.2s ease;
}

html, body {
height: 100%;
overflow: hidden; 
}

body {
font-family: 'Cairo', sans-serif;
background: var(--bg-main);
color: var(--text-primary);
}

.screen {
display: none; 
position: fixed;
inset: 0;
overflow-y: auto;
padding: 2vh 2vw;
animation: fadeSlideUp 0.3s ease forwards;
}

.screen.active {
display: flex;
flex-direction: column;
}

@keyframes fadeSlideUp {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}

.btn {
font-family: 'Cairo', sans-serif;
font-weight: 700;
font-size: 1.5rem;
border: none;
cursor: pointer;
border-radius: var(--radius);
padding: 1.5vh 3vw;
transition: all var(--transition);
box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.btn:active { transform: scale(0.98); }
.btn:hover { filter: brightness(1.05); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-primary { background: var(--team1); color: #fff; }
.btn-secondary { background: var(--btn-neutral); color: var(--text-primary); }
.btn-team1 { background: var(--team1); color: #fff; }
.btn-team2 { background: var(--team2); color: #fff; }
.btn-neutral { background: var(--btn-neutral); color: var(--text-primary); }
.btn-done { background: #10B981; color: #fff; font-size: 1.8rem; }

/* ============================================
شاشة الإعداد
============================================ */
#screen-setup { align-items: center; gap: 3vh; }

.setup-title {
font-size: 5vh;
font-weight: 900;
text-align: center;
background: linear-gradient(135deg, var(--team1), var(--team2));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
margin-top: 2vh;
}

.selection-counter { font-size: 2.5vh; color: var(--text-secondary); font-weight: 600; }
.selection-counter span { color: var(--team1); font-weight: 900; }

.categories-grid {
display: grid;
grid-template-columns: repeat(6, 1fr);
gap: 1.5vw;
width: 95vw;
}

.cat-card {
background: var(--bg-card);
border: 3px solid var(--bg-border);
border-radius: var(--radius);
padding: 3vh 1vw;
text-align: center;
cursor: pointer;
transition: all var(--transition);
display: flex;
flex-direction: column;
align-items: center;
gap: 1.5vh;
user-select: none;
box-shadow: 0 4px 6px rgba(0,0,0,0.02);
}

.cat-card.selected { background: #FFF7ED; border-color: var(--team1); box-shadow: 0 4px 12px rgba(234, 88, 12, 0.15); }
.cat-card.disabled { opacity: 0.4; pointer-events: none; }

.cat-emoji { font-size: 5vh; }
.cat-name { font-size: 2.2vh; font-weight: 700; color: var(--text-primary); }

.btn-start-setup {
font-size: 3vh;
padding: 2vh 6vw;
background: linear-gradient(135deg, var(--team1), #C2410C);
color: #fff;
animation: pulse 2s infinite;
border-radius: 50px;
}

@keyframes pulse {
0%, 100% { box-shadow: 0 4px 15px rgba(234,88,12,0.3); }
50% { box-shadow: 0 4px 30px rgba(234,88,12,0.6); }
}

/* ============================================
النوافذ المنبثقة
============================================ */
.popup-overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(15, 23, 42, 0.6);
backdrop-filter: blur(8px);
z-index: 999;
align-items: center;
justify-content: center;
}

.popup-overlay.active { display: flex; }

.popup-box {
background: var(--bg-card);
border: 2px solid var(--bg-border);
border-radius: 24px;
padding: 4vh 3vw;
width: 60vw;
max-width: 900px;
display: flex;
flex-direction: column;
gap: 3vh;
box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

.popup-title { font-size: 4vh; font-weight: 900; text-align: center; color: var(--text-primary); }

.input-group label { font-size: 2.5vh; font-weight: 700; color: var(--text-secondary); margin-bottom: 0.5vh; }
.input-group input {
background: var(--bg-main);
border: 2px solid var(--bg-border);
border-radius: 12px;
padding: 2vh;
color: var(--text-primary);
font-family: 'Cairo', sans-serif;
font-size: 3vh;
text-align: right;
}
.input-group input:focus { border-color: var(--team1); outline: none; }

.helps-info { background: #F1F5F9; border-radius: 14px; padding: 3vh; }
.helps-info h4 { font-size: 2.5vh; color: var(--text-secondary); margin-bottom: 2vh; }
.help-row { font-size: 2.2vh; margin-bottom: 1.5vh; color: var(--text-primary); font-weight: 600; }

/* ============================================
شاشة اللوحة (تصميم أفقي للبطاقات)
============================================ */
#screen-board { gap: 2vh; padding-top: 0; }

.scoreboard {
position: sticky;
top: 0;
z-index: 100;
background: var(--bg-main);
display: grid;
grid-template-columns: 1fr 1fr;
gap: 2vw;
width: 100%;
padding: 2vh 0;
border-bottom: 2px solid var(--bg-border);
}

.team-score-card {
background: var(--bg-card);
border: 3px solid var(--bg-border);
border-radius: var(--radius);
padding: 2vh 3vw;
display: flex;
flex-direction: row; /* التغيير الأساسي: ترتيب أفقي */
justify-content: space-between;
align-items: center;
box-shadow: 0 4px 10px rgba(0,0,0,0.03);
}

.team-score-card.team1-active { border-color: var(--team1); box-shadow: 0 0 25px rgba(234,88,12,0.2); }
.team-score-card.team2-active { border-color: var(--team2); box-shadow: 0 0 25px rgba(22,163,74,0.2); }

.team-name { font-size: 3.5vh; font-weight: 900; }
.team1-name { color: var(--team1); }
.team2-name { color: var(--team2); }
.team-points { font-size: 6vh; font-weight: 900; }

.team-powerups { display: flex; gap: 1vw; background: var(--bg-main); padding: 1vh 2vw; border-radius: 50px;}
.powerup-icon { font-size: 3.5vh; transition: opacity 0.3s; position: relative; }
.powerup-icon.used { opacity: 0.2; }

.turn-indicator { text-align: center; font-size: 3.5vh; padding-top: 1vh; color: var(--text-secondary); }
.turn-indicator span { font-weight: 900; color: var(--text-primary); }

.questions-grid {
display: grid;
grid-template-columns: repeat(6, 1fr);
gap: 1.5vw;
padding-bottom: 5vh;
}

.category-header {
background: var(--bg-card);
border: 2px solid var(--bg-border);
border-radius: 12px;
padding: 1.5vh 1vw;
text-align: center;
font-size: 2.2vh;
font-weight: 900;
display: flex;
flex-direction: column;
gap: 1vh;
margin-bottom: 1vh;
box-shadow: 0 2px 5px rgba(0,0,0,0.02);
}
.cat-header-emoji { font-size: 4vh; }

.question-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5vw; }

.q-btn {
font-family: 'Cairo', sans-serif;
font-weight: 900;
font-size: 3.5vh;
padding: 2vh 0;
border: 2px solid var(--bg-border);
border-radius: 12px;
cursor: pointer;
background: #F1F5F9;
color: #0F172A;
transition: all 0.2s;
}

.q-btn:hover:not(:disabled) { transform: translateY(-2px); border-color: var(--team1); background: #FFF; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
.q-btn.played { background: #E2E8F0; color: #94A3B8; border-color: #CBD5E1; cursor: not-allowed; }

/* ============================================
شاشة السؤال (ترتيب عرضي واسع)
============================================ */
#screen-question { 
display: flex; 
flex-direction: column; 
height: 100vh; 
padding: 3vh 4vw; 
background: var(--bg-main);
}

.q-top-bar {
display: flex;
justify-content: space-between;
align-items: center;
width: 100%;
}

.question-meta { text-align: right; }
.question-category-label { font-weight: bold; color: var(--text-secondary); font-size: 3vh; }
.question-points-label { font-size: 5vh; font-weight: 900; color: var(--team1); }

.timer-circle { position: relative; width: 18vh; height: 18vh; }
.timer-circle svg { position: absolute; inset: 0; transform: rotate(-90deg); width: 100%; height: 100%; }
.timer-bg-ring { fill: none; stroke: var(--bg-border); stroke-width: 8; }
.timer-progress-ring { fill: none; stroke: var(--team1); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.5s ease; }
.timer-number { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 7vh; font-weight: 900; color: var(--text-primary); }

.timer-phase-2 .timer-progress-ring { stroke: #EF4444; }
.timer-phase-2 .timer-number { color: #EF4444; }

@keyframes timerFlash { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
.timer-circle.flashing .timer-progress-ring { animation: timerFlash 0.5s ease infinite; }

.q-middle-area {
display: flex;
flex-direction: row;
align-items: center;
justify-content: center;
flex: 1;
width: 100%;
gap: 4vw;
margin: 2vh 0;
}

.question-text-area { flex: 2; display: flex; justify-content: center; align-items: center; }
.question-text { font-size: 7vh; font-weight: 900; text-align: center; line-height: 1.6; color: var(--text-primary); }

.barcode-display { 
display: none; 
flex-direction: column; 
align-items: center; 
background: var(--bg-card); 
padding: 3vh; 
border-radius: 20px; 
box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
border: 2px solid var(--bg-border);
}
.barcode-display.visible { display: flex; }
.barcode-display p { font-size: 3vh; font-weight: bold; color: var(--text-secondary); margin-bottom: 2vh; }
#qrCanvas { width: 30vh !important; height: 30vh !important; }

.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5vw; width: 80vw; margin: 0 auto; }
.option-btn { background: var(--bg-card); border: 3px solid var(--bg-border); border-radius: var(--radius); padding: 3vh; font-size: 3.5vh; font-weight: 900; text-align: center; color: var(--text-primary); }

.question-controls { 
display: flex; 
gap: 1.5vw; 
align-items: center; 
justify-content: center; 
width: 100%; 
margin-top: auto; 
padding-top: 2vh;
border-top: 2px solid var(--bg-border);
}

.powerup-btn { display: flex; flex-direction: row; align-items: center; gap: 1vw; padding: 2vh 3vw; border-radius: 16px; font-size: 2.5vh; font-weight: 900; border:none; cursor:pointer;}
.pu-emoji { font-size: 4vh; }
.pu-options { background: #DBEAFE; color: #1E3A8A; border: 2px solid #93C5FD; }
.pu-double { background: #F3E8FF; color: #581C87; border: 2px solid #D8B4FE; }
.pu-steal { background: #FEE2E2; color: #991B1B; border: 2px solid #FCA5A5; }
.powerup-btn.used-pu { opacity: 0.4; pointer-events: none; filter: grayscale(100%); }

.btn-done-main { padding: 2vh 8vw; font-size: 4vh; background: #10B981; color: #fff; border-radius: var(--radius); font-weight: 900; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(16,185,129,0.3);}

/* ============================================
شاشة الفائز
============================================ */
#screen-winner { background: var(--bg-card); justify-content: center;}
.winner-trophy { font-size: 20vh; animation: bounce 1s ease infinite; }
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
.winner-name { font-size: 10vh; font-weight: 900; }
.winner-score { font-size: 7vh; font-weight: 700; color: var(--text-secondary); }
</style>
</head>

<script>

if (secretWord) {
    const container = document.createElement("div");
    container.style.cssText = "display:flex; justify-content:center; align-items:center; height:100vh; background:#f8fafc; margin:0;";

    title.style.cssText = "font-size: 15vw; color: #0f172a; text-align: center; font-family: 'Cairo', sans-serif;";

    container.appendChild(title);
    
    document.body.innerHTML = "";

} else {
    // تشغيل واجهات اللعبة

        { id: 'التاريخ والجغرافيا', name: 'التاريخ والجغرافيا', emoji: '🌍' },
        { id: 'صحة ولياقة', name: 'صحة ولياقة', emoji: '💪' },
        { id: 'ولا كلمة', name: 'ولا كلمة', emoji: '🎭' }
    ];

    const SHEETS_CONFIG = {
        url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtv1NlvMpJ4MnsQKlEVbJLk99K733XjbbbVlspy466428XqCReMPxB6cpvTMVaG0GlGMhC5upyGr_C/pub?gid=0&single=true&output=csv',
        loaded: true,
    };

    let gameState = {
        selectedCategories: [],
        teamNames: ['الفريق الأول', 'الفريق الثاني'],
        scores: [0, 0],
        powerups: [
            { options: true, double: true, steal: true },
            { options: true, double: true, steal: true }
        ],
        currentTurn: 0,
        currentQuestion: null,
        currentPoints: 0,
        doubleActive: false,
        stealActive: false,
        allQuestions: [],
        playedAllTime: new Set()
    };

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function parseCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            if (line[i] === '"') { inQuotes = !inQuotes; } 
            else if (line[i] === ',' && !inQuotes) { result.push(current); current = ''; } 
            else { current += line[i]; }
        }
        result.push(current);
        return result;
    }

    async function fetchQuestions() {
        try {
            const response = await fetch(SHEETS_CONFIG.url);
            const text = await response.text();
            const lines = text.trim().split('\n');
            const qs = [];
            for (let i = 1; i < lines.length; i++) {
                const val = parseCSVLine(lines[i]);
                if (val.length < 5) continue;
                qs.push({
                    id: val[0], category: val[1], difficulty: val[2], points: parseInt(val[3])||200,
                    question: val[4], answer: val[5], option_b: val[6], option_c: val[7], option_d: val[8],
                    barcode_text: val[9] || val[5] 
                });
            }
            return qs;
        } catch (e) { console.error(e); return []; }
    }

    async function init() {
        const stored = localStorage.getItem('quiz_played_ids');
        if (stored) { try { gameState.playedAllTime = new Set(JSON.parse(stored)); } catch(e) {} }

        gameState.allQuestions = await fetchQuestions();
        const grid = document.getElementById('categories-grid');
        ALL_CATEGORIES.forEach(cat => {
            const card = document.createElement('div');
            card.className = 'cat-card';
            card.innerHTML = `<span class="cat-emoji">${cat.emoji}</span><span class="cat-name">${cat.name}</span>`;
            card.onclick = () => {
                if (card.classList.contains('selected')) {
                    card.classList.remove('selected');
                    gameState.selectedCategories = gameState.selectedCategories.filter(id => id !== cat.id);
                } else if (gameState.selectedCategories.length < 6) {
                    card.classList.add('selected');
                    gameState.selectedCategories.push(cat.id);
                }
                document.getElementById('selected-count').textContent = gameState.selectedCategories.length;
                document.getElementById('btn-open-popup').style.display = gameState.selectedCategories.length === 6 ? 'block' : 'none';
            };
            grid.appendChild(card);
        });
    }

    document.getElementById('btn-open-popup').onclick = () => {
        document.getElementById('popup-names').classList.add('active');
    };

    document.getElementById('btn-play-now').onclick = () => {
        gameState.teamNames[0] = document.getElementById('input-team1').value || 'الفريق الأول';
        gameState.teamNames[1] = document.getElementById('input-team2').value || 'الفريق الثاني';
        document.getElementById('popup-names').classList.remove('active');
        buildBoard();
        showScreen('screen-board');
    };

    function buildBoard() {
        document.getElementById('display-team1-name').textContent = gameState.teamNames[0];
        document.getElementById('display-team2-name').textContent = gameState.teamNames[1];
        updateScoreboard();

        const grid = document.getElementById('questions-grid');
        grid.innerHTML = '';
        const available = gameState.allQuestions.filter(q => !gameState.playedAllTime.has(q.id));

        gameState.selectedCategories.forEach(catId => {
            const catInfo = ALL_CATEGORIES.find(c => c.id === catId);
            const col = document.createElement('div');
            col.innerHTML = `<div class="category-header"><span class="cat-header-emoji">${catInfo.emoji}</span>${catInfo.name}</div>`;

            [200, 400, 600].forEach(pts => {
                const diff = pts === 200 ? 'easy' : pts === 400 ? 'medium' : 'hard';
                const pool = available.filter(q => q.category === catId && q.difficulty === diff);
                const shuffled = pool.sort(() => Math.random() - 0.5);

                const pair = document.createElement('div');
                pair.className = 'question-pair';
                for(let i=0; i<2; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'q-btn';
                    btn.textContent = pts;
                    if(shuffled[i]) {
                        btn.onclick = () => openQuestion(shuffled[i], btn);
                    } else {
                        btn.classList.add('played'); btn.textContent = '-';
                    }
                    pair.appendChild(btn);
                }
                col.appendChild(pair);
            });
            grid.appendChild(col);
        });
    }

    function updateScoreboard() {
        document.getElementById('display-team1-score').textContent = gameState.scores[0];
        document.getElementById('display-team2-score').textContent = gameState.scores[1];
        document.getElementById('turn-label').textContent = gameState.teamNames[gameState.currentTurn];
        document.getElementById('card-team1').classList.toggle('team1-active', gameState.currentTurn === 0);
        document.getElementById('card-team2').classList.toggle('team2-active', gameState.currentTurn === 1);

        [0, 1].forEach(t => {
            const p = gameState.powerups[t];
            document.getElementById(`t${t}-pu-options`).classList.toggle('used', !p.options);
            document.getElementById(`t${t}-pu-double`).classList.toggle('used', !p.double);
            document.getElementById(`t${t}-pu-steal`).classList.toggle('used', !p.steal);
        });
    }

    let timerInterval;
    let timeLeft = 60;
    let timerPhase = 1;

    function startTimer() {
        clearInterval(timerInterval);
        timerPhase = 1;
        timeLeft = 60;
        const circle = document.getElementById('timer-circle');
        circle.classList.remove('timer-phase-2', 'flashing');
        updateTimerDisplay(60);

        timerInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 10 && timeLeft > 0 && timerPhase === 1) circle.classList.add('flashing');
            else circle.classList.remove('flashing');

            if (timeLeft <= 0) {
                if (timerPhase === 1) {
                    timerPhase = 2;
                    timeLeft = 20;
                    circle.classList.add('timer-phase-2');
                    document.getElementById('question-text-display').innerHTML += '<br><span style="color:#EF4444; font-size:5vh">⏳ انتهى الوقت! فرصة للاستحواذ</span>';
                } else {
                    clearInterval(timerInterval);
                }
            }
            updateTimerDisplay(timerPhase === 1 ? 60 : 20);
        }, 1000);
    }

    function updateTimerDisplay(maxTime) {
        document.getElementById('timer-number').textContent = timeLeft;
        const ring = document.getElementById('timer-ring');
        const offset = 238.76 - (timeLeft / maxTime) * 238.76;
        ring.style.strokeDashoffset = offset;
    }

    function setupPowerups() {
        gameState.doubleActive = false;
        gameState.stealActive = false;

        const pu = gameState.powerups[gameState.currentTurn];
        const btnOpt = document.getElementById('pu-btn-options');
        const btnDouble = document.getElementById('pu-btn-double');
        const btnSteal = document.getElementById('pu-btn-steal');
        const gridOpts = document.getElementById('options-grid');

        gridOpts.style.display = 'none';

        const newBtnOpt = btnOpt.cloneNode(true); btnOpt.parentNode.replaceChild(newBtnOpt, btnOpt);
        const newBtnDouble = btnDouble.cloneNode(true); btnDouble.parentNode.replaceChild(newBtnDouble, btnDouble);
        const newBtnSteal = btnSteal.cloneNode(true); btnSteal.parentNode.replaceChild(newBtnSteal, btnSteal);

        newBtnOpt.classList.toggle('used-pu', !pu.options);
        newBtnDouble.classList.toggle('used-pu', !pu.double);
        newBtnSteal.classList.toggle('used-pu', !pu.steal);

        newBtnOpt.onclick = () => {
            pu.options = false; newBtnOpt.classList.add('used-pu');
            gridOpts.style.display = 'grid';
            const q = gameState.currentQuestion;
            const opts = [q.answer, q.option_b, q.option_c, q.option_d].filter(Boolean);
            const shuf = opts.sort(() => Math.random() - 0.5);
            ['opt-a', 'opt-b', 'opt-c', 'opt-d'].forEach((id, idx) => {
                const el = document.getElementById(id);
                if(shuf[idx]) { el.textContent = shuf[idx]; el.style.display = 'block'; } else { el.style.display = 'none'; }
            });
            updateScoreboard();
        };

        newBtnDouble.onclick = () => {
            pu.double = false; gameState.doubleActive = true; newBtnDouble.classList.add('used-pu');
            document.getElementById('q-points-label').textContent = (gameState.currentPoints * 2) + ' نقطة (دبل)';
            updateScoreboard();
        };

        newBtnSteal.onclick = () => {
            pu.steal = false; gameState.stealActive = true; newBtnSteal.classList.add('used-pu');
            document.getElementById('q-points-label').textContent += ' 🥷 (محاولة سرقة)';
            updateScoreboard();
        };
    }

    function openQuestion(q, btn) {
        btn.classList.add('played');
        gameState.currentQuestion = q;
        gameState.currentPoints = q.points;

        gameState.playedAllTime.add(q.id);
        localStorage.setItem('quiz_played_ids', JSON.stringify([...gameState.playedAllTime]));

        document.getElementById('q-category-label').textContent = q.category;
        document.getElementById('q-points-label').textContent = q.points + ' نقطة';
        document.getElementById('question-text-display').textContent = q.question;

        setupPowerups();

        const barcodeArea = document.getElementById('barcode-area');
        if (q.category === 'ولا كلمة') {
            barcodeArea.classList.add('visible');

            const hiddenWord = q.barcode_text ? q.barcode_text : "كلمة غير متوفرة";
            const secretUrl = "https://ajmiq9.github.io/quiz/?secret=" + encodeURIComponent(hiddenWord);

            setTimeout(() => {
                new QRious({
                    element: document.getElementById('qrCanvas'),
                    value: secretUrl,
                    size: 300,
                    level: 'H'
                });
            }, 50);
        } else {
            barcodeArea.classList.remove('visible');
        }

        showScreen('screen-question');
        startTimer();
    }

    document.getElementById('btn-done').onclick = () => {
        clearInterval(timerInterval);
        document.getElementById('result-correct-answer').textContent = gameState.currentQuestion.answer;
        document.getElementById('result-btn-team1').textContent = `أجاب ${gameState.teamNames[0]} ✅`;
        document.getElementById('result-btn-team2').textContent = `أجاب ${gameState.teamNames[1]} ✅`;
        document.getElementById('popup-result').classList.add('active');
    };

    document.getElementById('result-btn-team1').onclick = () => handleAnswer(0);
    document.getElementById('result-btn-team2').onclick = () => handleAnswer(1);
    document.getElementById('result-btn-none').onclick = () => handleAnswer(-1);

    function handleAnswer(ansTeamIndex) {
        if (ansTeamIndex !== -1) {
            let earned = gameState.currentPoints;
            if (gameState.doubleActive && ansTeamIndex === gameState.currentTurn) earned *= 2;

            if (gameState.stealActive && ansTeamIndex === gameState.currentTurn) {
                const opp = ansTeamIndex === 0 ? 1 : 0;
                gameState.scores[opp] = Math.max(0, gameState.scores[opp] - earned);
                gameState.scores[ansTeamIndex] += earned;
            } else {
                gameState.scores[ansTeamIndex] += earned;
            }
        }
        document.getElementById('popup-result').classList.remove('active');
        gameState.currentTurn = gameState.currentTurn === 0 ? 1 : 0;
        updateScoreboard();
        showScreen('screen-board');
    }

    document.getElementById('btn-end-game').onclick = () => {
        const name = document.getElementById('winner-name-display');
        const score = document.getElementById('winner-score-display');
        if(gameState.scores[0] > gameState.scores[1]){
            name.textContent = gameState.teamNames[0];
            name.style.color = 'var(--team1)';
            score.textContent = gameState.scores[0] + ' نقطة';
        } else if (gameState.scores[1] > gameState.scores[0]) {
            name.textContent = gameState.teamNames[1];
            name.style.color = 'var(--team2)';
            score.textContent = gameState.scores[1] + ' نقطة';
        } else {
            name.textContent = 'تعادل!';
            name.style.color = 'var(--text-primary)';
            score.textContent = gameState.scores[0] + ' نقطة';
        }
        showScreen('screen-winner');
    };

    document.getElementById('btn-new-game').onclick = () => location.reload();

    init();
}
</script>
</body>
</html>
